{% extends 'base.html' %}
{% block title %}Calendar — Eagle LMS{% endblock %}
{% block page_title %}Training Calendar{% endblock %}
{% block content %}
<div style="display:grid;grid-template-columns:1fr 300px;gap:22px;align-items:start">
  <div>
    <div class="card anim-up mb-4">
      <div style="padding:18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <button onclick="prev()" class="btn btn-secondary btn-sm">← Prev</button>
        <h3 id="cal-title" style="font-family:'DM Serif Display',serif;font-size:20px"></h3>
        <button onclick="next()" class="btn btn-secondary btn-sm">Next →</button>
      </div>
      <div class="cal-hdr">
        {% for d in ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] %}
        <div class="cal-hdr-cell">{{ d }}</div>
        {% endfor %}
      </div>
      <div id="cal-body" class="cal-body" style="border:none"></div>
    </div>

    <div class="flex gap-4 anim-up d1" style="flex-wrap:wrap">
      <div class="flex items-c gap-2 t-sm t-secondary"><div style="width:12px;height:12px;background:var(--acc);border-radius:3px"></div>Training Module</div>
      <div class="flex items-c gap-2 t-sm t-secondary"><div style="width:12px;height:12px;background:var(--amber);border-radius:3px"></div>Test</div>
    </div>
  </div>

  <div>
    <div class="sh mb-4 anim-r"><div class="sh-title">Upcoming Events</div></div>
    <div id="upcoming-list" class="anim-r d1"></div>
  </div>
</div>

<!-- Event Detail Popup -->
<div id="ev-popup" style="display:none;position:fixed;z-index:999;background:var(--card);border:1px solid var(--border);border-radius:var(--r3);box-shadow:0 8px 32px rgba(0,0,0,.18);padding:18px;min-width:260px;max-width:320px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <span id="ev-popup-badge" class="badge"></span>
    <button onclick="closePopup()" style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:18px;line-height:1">✕</button>
  </div>
  <div id="ev-popup-title" style="font-weight:700;font-size:15px;margin-bottom:10px;line-height:1.4"></div>
  <div id="ev-popup-details" style="font-size:12.5px;color:var(--t2);display:flex;flex-direction:column;gap:6px"></div>
  <div id="ev-popup-link" style="margin-top:12px"></div>
</div>
<div id="ev-overlay" onclick="closePopup()" style="display:none;position:fixed;inset:0;z-index:998"></div>

<script>
const evs = {{ events|safe }};
let cur = new Date();
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function fmtTime(dt){
  if(!dt) return '—';
  const d=new Date(dt);
  return d.toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});
}
function fmtTimeShort(dt){
  if(!dt) return '';
  const d=new Date(dt);
  return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

function openPopup(ev, rect){
  const popup=document.getElementById('ev-popup');
  const badge=document.getElementById('ev-popup-badge');
  const isModule=ev.type==='module';
  badge.textContent=isModule?'📚 Module':'📝 Test';
  badge.className='badge '+(isModule?'b-blue':'b-amber');
  document.getElementById('ev-popup-title').textContent=ev.title;
  let det='';
  if(ev.start) det+=`<div><span style="color:var(--t3)">🟢 Start</span> &nbsp;${fmtTime(ev.start)}</div>`;
  if(ev.end)   det+=`<div><span style="color:var(--t3)">🔴 End</span> &nbsp;&nbsp;&nbsp;${fmtTime(ev.end)}</div>`;
  if(ev.color && isModule) det+=`<div style="display:flex;align-items:center;gap:6px"><span style="color:var(--t3)">🏷</span> <span class="badge b-neutral" style="font-size:10px">${ev.color||''}</span></div>`;
  document.getElementById('ev-popup-details').innerHTML=det;
  const link=document.getElementById('ev-popup-link');
  if(ev.id && isModule){
    link.innerHTML=`<a href="/trainee/module/${ev.id}" class="btn btn-primary btn-sm" style="width:100%;justify-content:center">Open Module →</a>`;
  } else { link.innerHTML=''; }
  popup.style.display='block';
  document.getElementById('ev-overlay').style.display='block';
  // Position popup near click
  const vw=window.innerWidth, vh=window.innerHeight;
  let left=rect.left+window.scrollX, top=rect.bottom+window.scrollY+4;
  if(left+340>vw) left=vw-340;
  if(top+250>vh+window.scrollY) top=rect.top+window.scrollY-250;
  popup.style.left=left+'px'; popup.style.top=top+'px';
}
function closePopup(){
  document.getElementById('ev-popup').style.display='none';
  document.getElementById('ev-overlay').style.display='none';
}

function render(y,m){
  document.getElementById('cal-title').textContent=MONTHS[m]+' '+y;
  let dow=new Date(y,m,1).getDay(); if(dow===0) dow=7;
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  let html='';
  for(let i=1;i<dow;i++) html+='<div class="cal-cell other"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const de=evs.filter(e=>e.start&&e.start.startsWith(ds));
    html+=`<div class="cal-cell${isT?' today':''}">`;
    html+=`<div class="cal-day">${d}${isT?'<span style="display:inline-block;width:5px;height:5px;background:var(--acc);border-radius:50%;margin-left:3px;vertical-align:middle"></span>':''}</div>`;
    de.forEach((e,idx)=>{
      const timeStr=fmtTimeShort(e.start);
      html+=`<div class="cal-ev ${e.type==='module'?'mod':'tst'}" 
        style="cursor:pointer;${e.color&&e.type==='module'?'background:'+e.color+'22;border-left:2px solid '+e.color+';':''}"
        data-idx="${evs.indexOf(e)}"
        title="${e.title} · ${timeStr}">
        <span style="font-size:9px;opacity:.75;display:block;line-height:1.2">${timeStr}</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block">${e.title.substring(0,13)}${e.title.length>13?'…':''}</span>
      </div>`;
    });
    html+='</div>';
  }
  document.getElementById('cal-body').innerHTML=html;
  // Attach click handlers
  document.querySelectorAll('.cal-ev[data-idx]').forEach(el=>{
    el.addEventListener('click',function(ev2){
      ev2.stopPropagation();
      const e=evs[parseInt(this.dataset.idx)];
      openPopup(e, this.getBoundingClientRect());
    });
  });
}

function prev(){cur.setMonth(cur.getMonth()-1);render(cur.getFullYear(),cur.getMonth());}
function next(){cur.setMonth(cur.getMonth()+1);render(cur.getFullYear(),cur.getMonth());}

// Upcoming events
const now=new Date().toISOString();
const upcoming=evs.filter(e=>e.start>now).sort((a,b)=>a.start.localeCompare(b.start)).slice(0,10);
const el=document.getElementById('upcoming-list');
if(!upcoming.length){
  el.innerHTML='<div class="card card-p center" style="padding:32px"><div style="font-size:28px;margin-bottom:8px">✅</div><div class="t-sm t-muted">No upcoming events</div></div>';
} else {
  el.innerHTML=upcoming.map(e=>`
  <a href="${e.id&&e.type==='module'?'/trainee/module/'+e.id:'#'}">
    <div class="card card-p" style="margin-bottom:10px;border-left:3px solid ${e.type==='module'?(e.color||'var(--acc)'):'var(--amber)'}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div style="font-weight:600;font-size:13px;margin-bottom:4px;line-height:1.4;flex:1">${e.title}</div>
        <span class="badge ${e.type==='module'?'b-blue':'b-amber'}" style="font-size:9px;flex-shrink:0">${e.type}</span>
      </div>
      <div style="font-size:11.5px;color:var(--t2);display:flex;flex-direction:column;gap:3px">
        <div>🟢 <strong>Start:</strong> ${fmtTime(e.start)}</div>
        ${e.end?`<div>🔴 <strong>End:</strong>&nbsp;&nbsp; ${fmtTime(e.end)}</div>`:''}
      </div>
    </div>
  </a>`).join('');
}

render(cur.getFullYear(),cur.getMonth());
</script>
{% endblock %}
