{% extends 'base.html' %}
{% block title %}Calendar — Eagle LMS{% endblock %}
{% block page_title %}Training Calendar{% endblock %}
{% block content %}
<div style="display:grid;grid-template-columns:1fr 280px;gap:22px;align-items:start">
  <div>
    <div class="card anim-up mb-4">
      <div style="padding:18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <button onclick="prev()" class="btn btn-secondary btn-sm">← Prev</button>
        <h3 id="cal-title" style="font-family:'DM Serif Display',serif;font-size:20px"></h3>
        <button onclick="next()" class="btn btn-secondary btn-sm">Next →</button>
      </div>
      <div class="cal-hdr">
        {% for d in ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'] %}
        <div class="cal-hdr-cell">{{ d }}</div>
        {% endfor %}
      </div>
      <div id="cal-body" class="cal-body" style="border:none"></div>
    </div>

    <div class="flex gap-4 anim-up d1" style="flex-wrap:wrap">
      <div class="flex items-c gap-2 t-sm t-secondary"><div style="width:12px;height:12px;background:var(--acc);border-radius:3px"></div>Training Module</div>
      <div class="flex items-c gap-2 t-sm t-secondary"><div style="width:12px;height:12px;background:var(--amber);border-radius:3px"></div>Test</div>
    </div>
  </div>

  <div>
    <div class="sh mb-4 anim-r"><div class="sh-title">Upcoming Events</div></div>
    <div id="upcoming-list" class="anim-r d1"></div>
  </div>
</div>

<script>
const evs = {{ events|safe }};
let cur = new Date();
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

function render(y,m){
  document.getElementById('cal-title').textContent=MONTHS[m]+' '+y;
  let dow=new Date(y,m,1).getDay(); if(dow===0) dow=7;
  const days=new Date(y,m+1,0).getDate();
  const today=new Date();
  let html='';
  for(let i=1;i<dow;i++) html+='<div class="cal-cell other"></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    const de=evs.filter(e=>e.start&&e.start.startsWith(ds));
    html+=`<div class="cal-cell${isT?' today':''}">`;
    html+=`<div class="cal-day">${d}${isT?'<span style="display:inline-block;width:5px;height:5px;background:var(--acc);border-radius:50%;margin-left:3px;vertical-align:middle"></span>':''}</div>`;
    de.forEach(e=>{ html+=`<div class="cal-ev ${e.type==='module'?'mod':'tst'}" title="${e.title}">${e.title.substring(0,14)}...</div>`; });
    html+='</div>';
  }
  document.getElementById('cal-body').innerHTML=html;
}

function prev(){cur.setMonth(cur.getMonth()-1);render(cur.getFullYear(),cur.getMonth());}
function next(){cur.setMonth(cur.getMonth()+1);render(cur.getFullYear(),cur.getMonth());}

// Upcoming events
const now=new Date().toISOString();
const upcoming=evs.filter(e=>e.start>now).sort((a,b)=>a.start.localeCompare(b.start)).slice(0,8);
const el=document.getElementById('upcoming-list');
if(!upcoming.length){
  el.innerHTML='<div class="card card-p center" style="padding:32px"><div style="font-size:28px;margin-bottom:8px">✅</div><div class="t-sm t-muted">No upcoming events</div></div>';
} else {
  el.innerHTML=upcoming.map(e=>`
  <a href="${e.id?'/trainee/module/'+e.id:'#'}">
    <div class="card card-p" style="margin-bottom:10px;border-left:3px solid ${e.type==='module'?'var(--acc)':'var(--amber)'}">
      <div style="font-weight:600;font-size:13.5px;margin-bottom:3px">${e.title}</div>
      <div class="t-xs t-secondary">${e.start?e.start.replace('T',' ').slice(0,16):'—'}</div>
      <span class="badge ${e.type==='module'?'b-blue':'b-amber'}" style="margin-top:6px;font-size:10px">${e.type}</span>
    </div>
  </a>`).join('');
}

render(cur.getFullYear(),cur.getMonth());
</script>
{% endblock %}
